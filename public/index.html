<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramble–TCM 2026 Program Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #1a120b;
  --bg-darker: #110c07;
  --bg-panel: #2c1f14;
  --bg-card: #3d2b1f;
  --bg-card-hover: #4a3728;
  --text-light: #f5e6c8;
  --text-muted: #9a8060;
  --accent-copper: #b87333;
  --accent-gold: #c9a227;
  --border-main: #4a3728;
  --font-heading: 'Orbitron', sans-serif;
  --font-body: 'Share Tech Mono', 'Courier New', monospace;
  --sidebar-w: 300px;
  --header-h: 110px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body { background:var(--bg-darker); color:var(--text-light); font-family:var(--font-body); }

/* ═══ HEADER / TITLE BAR ═══ */
.top-bar {
  position:fixed; top:0; left:0; right:0; height:var(--header-h);
  background:linear-gradient(135deg,var(--bg-darker) 0%,#3d2b1f 50%,var(--bg-darker) 100%);
  border-bottom:4px solid var(--accent-copper);
  display:flex; align-items:center; padding:0 2rem;
  z-index:1000;
}
.top-bar::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(184,115,51,0.04) 60px,rgba(184,115,51,0.04) 61px);
  pointer-events:none;
}
.menu-toggle {
  display:none; background:none; border:1px solid var(--accent-copper);
  color:var(--accent-gold); font-size:1.4rem; padding:6px 12px;
  border-radius:4px; cursor:pointer; margin-right:1.5rem;
  font-family:var(--font-body); transition:all 0.2s; position:relative; z-index:1;
}
.menu-toggle:hover { background:var(--accent-copper); color:#fff; }
.title-content { flex:1; text-align:center; position:relative; z-index:1; }
.main-title {
  font-family:var(--font-heading); font-size:2.2rem; font-weight:900;
  color:var(--accent-gold); text-transform:uppercase; letter-spacing:4px;
  text-shadow:0 2px 8px rgba(0,0,0,0.5); line-height:1.2;
}
.title-meta {
  display:flex; align-items:center; justify-content:center;
  gap:1.5rem; margin-top:0.5rem; flex-wrap:wrap;
}
.subtitle {
  font-family:var(--font-body); font-size:0.8rem; color:var(--text-muted); letter-spacing:1px;
}
.viewing-badge {
  font-family:var(--font-heading); font-size:0.65rem; color:var(--accent-copper);
  letter-spacing:1.5px; text-transform:uppercase;
  padding:5px 14px; border:1px solid rgba(184,115,51,0.4);
  border-radius:4px; background:rgba(184,115,51,0.08); white-space:nowrap;
}
.viewing-badge.is-current { border-color:var(--accent-gold); color:var(--accent-gold); background:rgba(201,162,39,0.1); }

/* ═══ SIDEBAR ═══ */
.sidebar {
  position:fixed; top:var(--header-h); left:0; bottom:0;
  width:var(--sidebar-w); background:var(--bg-panel);
  border-right:2px solid var(--border-main);
  display:flex; flex-direction:column;
  z-index:900; transition:transform 0.3s ease;
}
.sidebar-header {
  padding:1.4rem 1.2rem 1rem; border-bottom:1px solid var(--border-main); flex-shrink:0;
}
.sidebar-header h2 {
  font-family:var(--font-heading); font-size:0.7rem; font-weight:600;
  color:var(--accent-gold); text-transform:uppercase; letter-spacing:2px;
}
.sidebar-hint { font-size:0.68rem; color:var(--text-muted); margin-top:0.4rem; line-height:1.4; }
.version-count {
  display:inline-block; font-family:var(--font-heading); font-size:0.5rem;
  background:var(--accent-copper); color:var(--bg-dark);
  padding:2px 7px; border-radius:10px; margin-left:0.5rem;
  font-weight:700; vertical-align:middle;
}
.version-list { flex:1; overflow-y:auto; padding:0.8rem; }
.version-list::-webkit-scrollbar { width:6px; }
.version-list::-webkit-scrollbar-track { background:var(--bg-dark); border-radius:3px; }
.version-list::-webkit-scrollbar-thumb { background:var(--accent-copper); border-radius:3px; }

/* ═══ VERSION CARDS ═══ */
.version-card {
  background:var(--bg-card); border:1px solid var(--border-main);
  border-radius:6px; padding:0.9rem 1rem; margin-bottom:0.5rem;
  cursor:pointer; transition:all 0.2s ease; position:relative;
  border-left:3px solid transparent;
}
.version-card:hover {
  background:var(--bg-card-hover); border-color:var(--accent-copper);
  transform:translateX(2px); box-shadow:0 2px 12px rgba(0,0,0,0.2);
}
.version-card.active {
  border-left-color:var(--accent-gold); background:rgba(201,162,39,0.1);
  box-shadow:0 0 16px rgba(201,162,39,0.1);
}
.version-card.active .v-name { color:var(--accent-gold); }
.v-name {
  font-family:var(--font-heading); font-size:0.8rem; font-weight:700;
  color:var(--text-light); letter-spacing:1px;
}
.v-date { font-size:0.68rem; color:var(--text-muted); margin-top:0.3rem; }
.v-desc { font-size:0.68rem; color:var(--accent-copper); margin-top:0.35rem; line-height:1.4; font-style:italic; }
.badge {
  display:inline-block; font-family:var(--font-heading); font-size:0.45rem;
  font-weight:700; padding:2px 8px; border-radius:3px;
  letter-spacing:1px; text-transform:uppercase; margin-left:0.6rem; vertical-align:middle;
}
.badge-current { background:var(--accent-gold); color:var(--bg-dark); }

/* ═══ MAIN CONTENT ═══ */
.content {
  position:fixed; top:var(--header-h); left:var(--sidebar-w);
  right:0; bottom:0; background:#f5e6c8;
}
.iframe-container {
  position:absolute; inset:0; overflow:hidden;
  z-index: 1;
}
.iframe-container iframe {
  position:absolute; top:0; left:0;
  transform-origin:0 0; border:none; display:block;
}

/* ═══ ZOOM TOOLBAR ═══ */
.zoom-toolbar {
  position:absolute; bottom:24px; right:24px; z-index:100;
  display:flex; align-items:center; gap:3px;
  background:linear-gradient(135deg,rgba(26,18,11,0.95),rgba(61,43,31,0.95));
  border:2px solid var(--accent-copper); border-radius:10px;
  padding:6px 8px; box-shadow:0 6px 28px rgba(0,0,0,0.6);
  backdrop-filter:blur(12px); user-select:none;
}
.zoom-btn {
  font-family:var(--font-heading); font-size:1.1rem; font-weight:700;
  width:40px; height:40px;
  border:1px solid rgba(184,115,51,0.3); border-radius:6px;
  background:rgba(255,255,255,0.06); color:var(--accent-gold);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.zoom-btn:hover {
  background:var(--accent-copper); color:#fff;
  border-color:var(--accent-copper); transform:scale(1.05);
}
.zoom-btn:active { transform:scale(0.95); }
.zoom-btn-text {
  font-size:0.55rem; width:auto; padding:0 14px; letter-spacing:1px; text-transform:uppercase;
}
.zoom-level {
  font-family:var(--font-heading); font-size:0.72rem; font-weight:600;
  color:var(--text-light); min-width:54px; text-align:center; letter-spacing:1px;
}
.zoom-divider { width:1px; height:28px; background:rgba(184,115,51,0.3); margin:0 5px; }
.zoom-hint {
  font-family:var(--font-body); font-size:0.55rem; color:var(--text-muted);
  margin-left:6px; letter-spacing:0.5px;
}

/* ═══ LOADING ═══ */
.loading-overlay {
  position:absolute; inset:0; background:var(--bg-dark);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:60; transition:opacity 0.4s ease;
}
.loading-overlay.hidden { opacity:0; pointer-events:none; }
.spinner {
  width:44px; height:44px;
  border:3px solid var(--border-main); border-top-color:var(--accent-gold);
  border-radius:50%; animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text {
  font-family:var(--font-heading); font-size:0.65rem; color:var(--text-muted);
  margin-top:1.2rem; letter-spacing:2px; text-transform:uppercase;
}

/* ═══ ERROR STATE ═══ */
.error-state {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:var(--bg-dark); text-align:center; padding:2rem;
}
.error-icon { font-size:3rem; margin-bottom:1rem; opacity:0.7; }
.error-title {
  font-family:var(--font-heading); font-size:0.9rem;
  color:var(--accent-gold); letter-spacing:2px; margin-bottom:0.6rem;
}
.error-hint {
  font-size:0.72rem; color:var(--text-muted); letter-spacing:0.5px;
  max-width:420px; line-height:1.6;
}
.error-hint code {
  background:rgba(184,115,51,0.15); color:var(--accent-copper);
  padding:1px 6px; border-radius:3px;
}

/* ═══ BACKDROP ═══ */
.sidebar-backdrop {
  display:none; position:fixed; inset:0; z-index:899;
  background:rgba(0,0,0,0.5); backdrop-filter:blur(2px);
}
.sidebar-footer {
  padding:0.8rem 1.2rem; border-top:1px solid var(--border-main);
  font-size:0.55rem; color:var(--text-muted); text-align:center;
  font-family:var(--font-heading); letter-spacing:1px; flex-shrink:0;
}

/* ═══ RESPONSIVE ═══ */
@media (max-width:960px) {
  :root { --header-h:80px; }
  .menu-toggle { display:block; }
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); box-shadow:6px 0 30px rgba(0,0,0,0.5); }
  .sidebar.open ~ .sidebar-backdrop { display:block; }
  .content { left:0; }
  .main-title { font-size:1.3rem; letter-spacing:2px; }
  .subtitle { display:none; }
  .zoom-toolbar { bottom:14px; right:14px; padding:4px 5px; }
  .zoom-btn { width:34px; height:34px; font-size:0.95rem; }
  .zoom-btn-text { padding:0 10px; font-size:0.5rem; }
  .zoom-hint { display:none; }
}
@media (max-width:500px) {
  :root { --sidebar-w:280px; --header-h:70px; }
  .main-title { font-size:1rem; letter-spacing:1px; }
  .viewing-badge { font-size:0.5rem; padding:4px 8px; }
}
</style>
</head>
<body>

<header class="top-bar">
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">☰</button>
  <div class="title-content">
    <div class="main-title">Ramble–TCM 2026 Program Schedule</div>
    <div class="title-meta">
      <span class="subtitle">Master Construction &amp; Procurement Timeline</span>
      <span class="viewing-badge" id="headerBadge">Loading…</span>
    </div>
  </div>
</header>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>Schedule Versions <span class="version-count" id="versionCount">0</span></h2>
    <p class="sidebar-hint">Each version is a weekly snapshot of the master schedule and Gantt chart.</p>
  </div>
  <div class="version-list" id="versionList"></div>
  <div class="sidebar-footer">© 2026 Ramble × TCM — Confidential</div>
</aside>
<div class="sidebar-backdrop" id="backdrop"></div>

<main class="content" id="content">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Loading schedule…</div>
  </div>

  <!-- SCALED IFRAME -->
  <div class="iframe-container" id="iframeContainer">
    <iframe id="scheduleFrame" title="Schedule View"></iframe>
  </div>

  <!-- ZOOM TOOLBAR -->
  <div class="zoom-toolbar" id="zoomToolbar">
    <button class="zoom-btn" id="zoomOut" title="Zoom Out">−</button>
    <div class="zoom-level" id="zoomLevel">100%</div>
    <button class="zoom-btn" id="zoomIn" title="Zoom In">+</button>
    <div class="zoom-divider"></div>
    <button class="zoom-btn zoom-btn-text" id="zoomFit" title="Fit entire schedule to screen">FIT</button>
    <button class="zoom-btn zoom-btn-text" id="zoomReset" title="Actual size (100%)">1 : 1</button>
    <span class="zoom-hint">Ctrl ± to zoom</span>
  </div>

</main>

<script>
(function () {
  // ─── DOM ───
  const sidebar      = document.getElementById('sidebar');
  const backdrop     = document.getElementById('backdrop');
  const menuToggle   = document.getElementById('menuToggle');
  const versionList  = document.getElementById('versionList');
  const versionCount = document.getElementById('versionCount');
  const frame        = document.getElementById('scheduleFrame');
  const container    = document.getElementById('iframeContainer');
  const loading      = document.getElementById('loadingOverlay');
  const headerBadge  = document.getElementById('headerBadge');
  const zoomLabel    = document.getElementById('zoomLevel');
  const btnIn        = document.getElementById('zoomIn');
  const btnOut       = document.getElementById('zoomOut');
  const btnFit       = document.getElementById('zoomFit');
  const btnReset     = document.getElementById('zoomReset');
  const zoomToolbar  = document.getElementById('zoomToolbar');

  let versions  = [];
  let activeId  = null;

  // ─── ZOOM ENGINE ───
  const MIN_ZOOM = 0.15;
  const MAX_ZOOM = 2.0;
  const STEP     = 0.1;
  let currentZoom = 1;

  function applyZoom(z) {
    currentZoom = Math.round(Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, z)) * 100) / 100;
    const inv = 1 / currentZoom;
    frame.style.transform = 'scale(' + currentZoom + ')';
    frame.style.width     = (inv * 100) + '%';
    frame.style.height    = (inv * 100) + '%';
    zoomLabel.textContent = Math.round(currentZoom * 100) + '%';
  }

  function fitToWidth() {
    try {
      var doc   = frame.contentDocument || frame.contentWindow.document;
      var table = doc.getElementById('schedule-table');
      if (table) {
        var tableW = table.scrollWidth || table.offsetWidth;
        var availW = container.clientWidth;
        applyZoom((availW / tableW) * 0.97);
        return;
      }
    } catch (e) { /* cross-origin or not loaded yet */ }
    applyZoom(0.35); // sensible fallback
  }

  function fitToAll() {
    try {
      var doc    = frame.contentDocument || frame.contentWindow.document;
      var body   = doc.body;
      var table  = doc.getElementById('schedule-table');
      if (body && table) {
        var contentW = table.scrollWidth || body.scrollWidth;
        var contentH = body.scrollHeight;
        var availW   = container.clientWidth;
        var availH   = container.clientHeight;
        var scaleW   = availW / contentW;
        var scaleH   = availH / contentH;
        applyZoom(Math.min(scaleW, scaleH) * 0.95);
        return;
      }
    } catch (e) {}
    applyZoom(0.85);
  }

  // ─── ZOOM CONTROLS ───
  btnIn.addEventListener('click',    function() { applyZoom(currentZoom + STEP); });
  btnOut.addEventListener('click',   function() { applyZoom(currentZoom - STEP); });
  btnFit.addEventListener('click',   fitToAll);
  btnReset.addEventListener('click', function() { applyZoom(1); });

  // Scroll wheel on the toolbar to zoom
  zoomToolbar.addEventListener('wheel', function(e) {
    e.preventDefault();
    applyZoom(currentZoom + (e.deltaY < 0 ? STEP : -STEP));
  }, { passive: false });

  // Ctrl+Plus / Ctrl+Minus keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    if (!(e.ctrlKey || e.metaKey)) return;
    if (e.key === '=' || e.key === '+') { e.preventDefault(); applyZoom(currentZoom + STEP); }
    if (e.key === '-')                  { e.preventDefault(); applyZoom(currentZoom - STEP); }
    if (e.key === '0')                  { e.preventDefault(); fitToAll(); }
  });

  // ─── SIDEBAR TOGGLE ───
  menuToggle.addEventListener('click', function() { sidebar.classList.toggle('open'); });
  backdrop.addEventListener('click',   function() { sidebar.classList.remove('open'); });

  // ─── IFRAME LOADED → auto-fit ───
  frame.addEventListener('load', function() {
    setTimeout(function() {
      loading.classList.add('hidden');
      sidebar.classList.remove('open');
      applyZoom(0.2);          // ← auto zoom-to-fit on every load
    }, 400);
  });

  // Re-fit on window resize
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(fitToAll, 200);
  });

  // ─── VERSION MANAGEMENT ───
  function getUrlVersion() {
    return new URLSearchParams(window.location.search).get('v');
  }
  function setUrlVersion(id) {
    var url = new URL(window.location);
    url.searchParams.set('v', id);
    window.history.pushState({ v: id }, '', url);
  }

  function loadVersion(id) {
    var ver = versions.find(function(v) { return v.id === id; });
    if (!ver) return;
    activeId = id;
    setUrlVersion(id);
    loading.classList.remove('hidden');
    // Reset zoom before loading so the old frame doesn't flash at wrong size
    applyZoom(1);
    frame.src = ver.file;
    headerBadge.textContent = ver.version;
    headerBadge.classList.toggle('is-current', !!ver.current);
    document.querySelectorAll('.version-card').forEach(function(card) {
      card.classList.toggle('active', card.dataset.id === id);
    });
  }

  function renderVersions() {
    versionList.innerHTML = '';
    versionCount.textContent = versions.length;
    versions.forEach(function(v) {
      var card = document.createElement('div');
      card.className = 'version-card';
      card.dataset.id = v.id;
      var badges = '';
      if (v.current) badges += '<span class="badge badge-current">Latest</span>';
      card.innerHTML =
        '<div class="v-name">' + esc(v.version) + badges + '</div>' +
        '<div class="v-date">Published: ' + esc(v.date) + '</div>' +
        (v.description ? '<div class="v-desc">' + esc(v.description) + '</div>' : '');
      card.addEventListener('click', function() { loadVersion(v.id); });
      versionList.appendChild(card);
    });
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function showError(msg) {
    loading.innerHTML =
      '<div class="error-state">' +
        '<div class="error-icon">⚠</div>' +
        '<div class="error-title">Cannot Load Versions</div>' +
        '<div class="error-hint">' + msg + '</div>' +
      '</div>';
  }

  // ─── BOOT ───
  fetch('versions.json?_=' + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      versions = data.sort(function(a, b) { return b.date.localeCompare(a.date); });
      renderVersions();
      var urlVer = getUrlVersion();
      var match  = urlVer && versions.find(function(v) { return v.id === urlVer; });
      var target = match ? match.id : (versions.find(function(v) { return v.current; }) || versions[0]).id;
      loadVersion(target);
    })
    .catch(function(err) {
      console.error(err);
      showError('Could not load <code>versions.json</code>.<br><br>Error: ' + esc(String(err)));
      headerBadge.textContent = 'Error';
    });

  window.addEventListener('popstate', function() {
    var v = getUrlVersion();
    if (v && v !== activeId) loadVersion(v);
  });
})();
</script>
</body>
</html>
